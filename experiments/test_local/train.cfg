[config]

mode = train
pretrained_model = CohereLabs/tiny-aya-global
language = npi_Deva

# Data
train_dataset = HuggingFaceFW/fineweb
train_dataset_subset = sample-10BT
train_num_sentences = 100
train_max_sentence_len = 128
eval_num_sentences = 100

# GRPO
grpo_group_size = 5
grpo_beta = 0.1
grpo_temperature = 0.3
grpo_top_p = 0.9
reward_metric = chrf

# Training
max_epochs = 3
learning_rate = 5e-6
batch_size = 3
gradient_accumulation_steps = 1
grad_norm = 1.0
warmup_steps = 100
eval_every_n_steps = 500

# Model
max_tokens = 256

# Logging
wandb_project = rl-translation-cycles
wandb_run_name = qwen3-0.6b-grpo

# Checkpointing
models_dir = checkpoints/qwen3_0.6b_grpo
