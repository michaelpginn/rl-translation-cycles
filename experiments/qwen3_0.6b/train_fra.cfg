[config]

mode = train
pretrained_model = michaelginn/Qwen3-0.6B

# See https://huggingface.co/datasets/openlanguagedata/flores_plus#dataset-structure about language ids
language = fra_Latn

train_dataset = HuggingFaceFW/fineweb
train_dataset_subset = sample-10BT
train_num_sentences = 10000
train_max_sentence_len = 128

grpo_group_size = 10
grpo_beta = 0.01
grpo_temperature = 0.5
grpo_top_p = 0.9
reward_metric = both

max_epochs = 2
learning_rate = 5e-6
batch_size = 3
gradient_accumulation_steps = 10
warmup_steps = 10
eval_every_n_steps = 10

models_dir = /scratch/alpine/migi8081/rltc/checkpoints/qwen3_0.6b_grpo
