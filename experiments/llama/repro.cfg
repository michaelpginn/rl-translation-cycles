[config]

mode = train
pretrained_model = meta-llama/Llama-3.2-1B-Instruct
language = ayr_Latn

train_dataset = breakend/nllb-multi-domain
train_num_sentences = 6000
train_max_sentence_len = 64
eval_dataset = breakend/nllb-multi-domain

grpo_group_size = 4
grpo_beta = 0.04
grpo_temperature = 1.8
grpo_top_p = 0.95
grpo_top_k = 100
reward_metric = both
greedy_backward = True

max_epochs = 2
learning_rate = 2e-6
batch_size = 2
gradient_accumulation_steps = 1
reference_update_steps = 16
inner_update_steps = 1
warmup_steps = 0
eval_every_n_steps = 10

models_dir = /scratch/alpine/migi8081/rltc/checkpoints/llama3
