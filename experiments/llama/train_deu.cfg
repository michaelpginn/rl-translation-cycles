[config]

mode = train
pretrained_model = meta-llama/Llama-3.2-1B-Instruct
language = deu_Latn

train_dataset = HuggingFaceFW/fineweb
train_dataset_subset = sample-10BT
train_num_sentences = 5000
train_max_sentence_len = 64

grpo_group_size = 10
grpo_beta = 0.05
grpo_temperature = 1.8
grpo_top_p = 0.9
reward_metric = bleu
greedy_backward = True

max_epochs = 3
learning_rate = 2e-6
batch_size = 6
gradient_accumulation_steps = 10
inner_update_steps = 16
warmup_steps = 10
eval_every_n_steps = 10

models_dir = /scratch/alpine/migi8081/rltc/checkpoints/llama3
